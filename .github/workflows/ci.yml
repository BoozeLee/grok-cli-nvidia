name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint 2>&1 | head -30 || true
      - run: npm run build 2>&1 | tail -20

